<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio KOBEN</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        background: #000;
        color: #fff;
        font-family: Arial, Helvetica, sans-serif;
        font-size: 16px;
        line-height: 1.25;

        display: flex;
        justify-content: center;
        align-items: center;

        min-height: 100vh;
        text-align: center;
    }

    #typewriter {
        white-space: pre-line;
    }

    .cursor {
        display: inline-block;
        animation: blink 0.8s infinite;
    }

    @keyframes blink {
        50% {
            opacity: 0;
        }
    }

    .portfolio-link {
        color: #fff;
        text-decoration: none;
        cursor: pointer;
    }

    .portfolio-link:hover {
        text-decoration: underline;
    }
</style>
</head>

<body>

<div id="typewriter"></div>

<script>
    const before = `Studio KOBEN\nSindshvilevej 9a\n2000 Frederiksberg\n\n`;
    const linkText = `Portfolio on request`;

    const element = document.getElementById('typewriter');

    let i = 0;
    let linkInserted = false;

    function type() {
        const full = before + linkText;
        if (i < full.length) {
            if (!linkInserted && i >= before.length) {
                const a = document.createElement('a');
                a.href = 'mailto:hello@koben.studio';
                a.className = 'portfolio-link';
                element.appendChild(a);
                linkInserted = true;
            }
            if (linkInserted) {
                element.querySelector('a').textContent += full.charAt(i);
            } else {
                element.textContent += full.charAt(i);
            }
            i++;
            setTimeout(type, 12);
        }
    }

    type();
</script>

</body>
</html>
