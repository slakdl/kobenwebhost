<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio KOBEN</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        background: #000;
        color: #fff;
        font-family: Arial, Helvetica, sans-serif;
        font-size: 16px;
        line-height: 1.25;

        display: flex;
        justify-content: center;
        align-items: center;

        min-height: 100vh;
        text-align: center;
    }

    #typewriter {
        white-space: pre-line;
    }

    .cursor {
        display: inline-block;
        animation: blink 0.8s infinite;
    }

    @keyframes blink {
        50% {
            opacity: 0;
        }
    }
</style>
</head>

<body>

<div id="typewriter"></div>

<script>
    const text = `Studio KOBEN
Sindshvilevej 9a
2000 Frederiksberg

Portfolio on request`;

    const element = document.getElementById('typewriter');

    let i = 0;

    function type() {
        if (i < text.length) {
            element.textContent += text.charAt(i);
            i++;
            setTimeout(type, 12); // speed
        }
    }

    type();
</script>

</body>
</html>
